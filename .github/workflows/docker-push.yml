name: Build and Push Docker Image to GHCR

# 手动触发工作流
on:
  workflow_dispatch:  # 允许手动触发此工作流

jobs:
  build:
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 环境

    steps:
      # Checkout 仓库代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 设置 Docker 登录
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # 使用 GITHUB_TOKEN 进行身份验证

      # 构建 Docker 镜像
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/60s:latest .

      # 推送 Docker 镜像到 GitHub Container Registry
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}/60s:latest
